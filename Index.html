<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TASHAN ELITE MODZ | PREDICTION SUITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-cyan: #0ff;
            --neon-purple: #bf00ff;
            --neon-violet: #7c3aed;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-orange: #ff6f00;
            --gold: #FFD700;
            --panel-bg: rgba(0,10,30,0.92);
            --blue-glass: rgba(0, 80, 200, 0.18);
            --violet-glass: rgba(100, 0, 200, 0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body, html {
            height: 100%; width: 100%;
            background: #000;
            overflow: hidden;
            color: white;
            font-family: 'Orbitron', sans-serif;
        }

        /* ===== ENTRY SCREEN ===== */
        #entry-screen {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #0a0020 0%, #000 70%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            gap: 0;
        }

        .entry-bg-glow {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(100,0,255,0.25) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -60%);
            pointer-events: none;
        }

        .entry-title {
            font-size: 13px; font-weight: 700; color: var(--neon-cyan);
            letter-spacing: 4px; text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 6px;
        }

        .entry-logo {
            font-size: 28px; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px var(--neon-purple), 0 0 40px var(--neon-blue);
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* ===== PHONE FRAME ===== */
        .phone-wrapper {
            position: relative;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .phone-wrapper:active { transform: scale(0.97); }

        .phone-frame {
            width: 200px;
            height: 360px;
            background: linear-gradient(145deg, #1a1a2e, #16213e, #0f3460);
            border-radius: 34px;
            border: 3px solid rgba(0,242,254,0.5);
            box-shadow:
                0 0 0 1px rgba(0,242,254,0.2),
                0 0 30px rgba(0,100,255,0.4),
                0 0 60px rgba(100,0,255,0.2),
                inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-notch {
            width: 60px; height: 10px;
            background: #000;
            border-radius: 0 0 10px 10px;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .phone-screen {
            width: 100%; flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        .phone-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .phone-home-bar {
            width: 60px; height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin: 8px 0;
            flex-shrink: 0;
        }

        .phone-btn-right {
            position: absolute;
            right: -5px; top: 80px;
            width: 4px; height: 50px;
            background: linear-gradient(to bottom, #333, #555, #333);
            border-radius: 2px;
        }

        .phone-btn-left1 {
            position: absolute;
            left: -5px; top: 70px;
            width: 4px; height: 25px;
            background: linear-gradient(to bottom, #333, #555, #333);
            border-radius: 2px;
        }

        .phone-btn-left2 {
            position: absolute;
            left: -5px; top: 105px;
            width: 4px; height: 35px;
            background: linear-gradient(to bottom, #333, #555, #333);
            border-radius: 2px;
        }

        .phone-neon-ring {
            position: absolute;
            width: 220px; height: 380px;
            border-radius: 38px;
            border: 1px solid rgba(0,242,254,0.15);
            pointer-events: none;
            animation: ringPulse 2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0,242,254,0.2); opacity: 0.6; }
            50% { box-shadow: 0 0 30px rgba(0,242,254,0.5); opacity: 1; }
        }

        .click-hint {
            margin-top: 16px;
            font-size: 10px;
            color: var(--neon-cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ===== FULLSCREEN VIDEO OVERLAY ===== */
        #video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #fullscreen-video {
            width: 100%; height: 100%;
            object-fit: cover;
            background: #000;
        }
        .video-glow-text {
            position: absolute;
            bottom: 12%; left: 0; right: 0;
            text-align: center;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(0,242,254,0.5);
            font-family: 'Orbitron', monospace;
            pointer-events: none;
            z-index: 20001;
            text-transform: uppercase;
            animation: pulseText 1.8s infinite;
        }
        @keyframes pulseText {
            0% { opacity: 0.2; }
            100% { opacity: 0.8; }
        }

        /* ===== GAME IFRAME ===== */
        #game-frame {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 100;
        }

        /* ===== FLOATING CIRCLE BUTTON ===== */
        #floating-circle {
            display: none;
            position: fixed;
            top: 70%; right: 20px;
            width: 65px; height: 65px;
            z-index: 10000;
            cursor: move;
            touch-action: none;
            border-radius: 50%;
            background: url('mickey.png') no-repeat center center/cover;
            background-color: #000;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,242,254,0.7), 0 0 30px rgba(0,100,255,0.4);
            animation: floatGlow 2s ease-in-out infinite;
        }

        @keyframes floatGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(0,242,254,0.6), 0 0 30px rgba(0,100,255,0.3); }
            50% { box-shadow: 0 0 25px rgba(0,242,254,0.9), 0 0 50px rgba(100,0,255,0.5); }
        }

        /* ===== BLUE PANEL ===== */
        #blue-panel {
            display: none;
            position: fixed;
            z-index: 10001;
            touch-action: none;
            cursor: move;
            width: 240px;
        }
        .blue-panel-inner {
            background: linear-gradient(135deg, rgba(0,30,80,0.88) 0%, rgba(0,10,50,0.92) 100%);
            border: 1.5px solid rgba(0,180,255,0.5);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,100,255,0.5), 0 0 40px rgba(0,50,150,0.3), inset 0 0 15px rgba(0,0,0,0.3);
        }
        .blue-panel-header {
            background: linear-gradient(90deg, rgba(0,80,200,0.7), rgba(0,150,255,0.4));
            padding: 7px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,180,255,0.3);
        }
        .blue-panel-title {
            font-size: 9px; font-weight: 700; color: var(--neon-cyan);
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .blue-panel-body {
            padding: 10px 12px;
            text-align: center;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .ready-text {
            font-size: 32px; font-weight: 900; color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,242,254,0.5);
            letter-spacing: 4px;
            animation: readyPulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes readyPulse {
            from { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0,242,254,0.4); }
            to   { text-shadow: 0 0 25px var(--neon-cyan), 0 0 50px rgba(0,242,254,0.8), 0 0 80px rgba(0,242,254,0.3); }
        }
        .system-online-text { font-size: 8px; color: rgba(0,242,254,0.7); letter-spacing: 3px; }
        .pred-label { font-size: 8px; color: rgba(0,242,254,0.6); letter-spacing: 2px; text-transform: uppercase; }
        .pred-big-small { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px currentColor; }
        .pred-big-small.BIG   { color: var(--neon-orange); text-shadow: 0 0 15px var(--neon-orange); }
        .pred-big-small.SMALL { color: var(--neon-cyan);   text-shadow: 0 0 15px var(--neon-cyan); }
        .data-injected-badge  { display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--neon-green); letter-spacing: 1px; }

        /* Pattern badge */
        .pattern-badge {
            font-size: 8px; font-weight: 700;
            padding: 2px 8px; border-radius: 8px;
            letter-spacing: 1px; text-transform: uppercase;
            margin: 1px 0;
            font-family: 'Rajdhani', sans-serif;
        }
        .pattern-continuation { background: rgba(255,111,0,0.2);  color: var(--neon-orange); border: 1px solid rgba(255,111,0,0.4); }
        .pattern-reversal     { background: rgba(0,242,254,0.15); color: var(--neon-cyan);   border: 1px solid rgba(0,242,254,0.35); }
        .pattern-zigzag       { background: rgba(0,255,136,0.15); color: var(--neon-green);  border: 1px solid rgba(0,255,136,0.35); }
        .pattern-cluster      { background: rgba(191,0,255,0.15); color: #d08fff;            border: 1px solid rgba(191,0,255,0.35); }
        .pattern-trap         { background: rgba(255,51,102,0.2); color: var(--neon-red);    border: 1px solid rgba(255,51,102,0.4); }
        .pattern-flip         { background: rgba(255,215,0,0.15); color: var(--gold);        border: 1px solid rgba(255,215,0,0.35); }
        .pattern-noise        { background: rgba(80,80,80,0.3);   color: #aaa;               border: 1px solid rgba(150,150,150,0.2); }

        /* Skip warning */
        .skip-warning {
            font-size: 9px; font-weight: 700;
            color: var(--neon-red);
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid rgba(255,51,102,0.4);
            border-radius: 8px;
            background: rgba(255,51,102,0.1);
            animation: blink 1s ease-in-out infinite;
        }

        /* Analysis lines */
        .analysis-line {
            font-size: 7px; color: rgba(0,200,255,0.65);
            letter-spacing: 1px; text-align: center;
            font-family: 'Rajdhani', sans-serif; font-weight: 500;
            width: 100%; padding: 1px 0;
        }
        .analysis-line i { margin-right: 3px; font-size: 6px; }
        .color-analysis-line {
            font-size: 7px; color: rgba(180,120,255,0.75);
            letter-spacing: 1px; text-align: center;
            font-family: 'Rajdhani', sans-serif; font-weight: 500;
            width: 100%;
        }
        .color-analysis-line i { margin-right: 3px; font-size: 6px; }

        /* Trend dots row */
        .trend-row {
            display: flex; gap: 3px; justify-content: center;
            align-items: center; margin: 2px 0;
            flex-wrap: wrap; max-width: 210px;
        }
        .trend-dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block; flex-shrink: 0;
        }
        .td-big   { background: var(--neon-orange); box-shadow: 0 0 4px var(--neon-orange); }
        .td-small { background: var(--neon-cyan);   box-shadow: 0 0 4px var(--neon-cyan); }

        /* Win/loss stat */
        .win-stat {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.35);
            padding: 3px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08); margin-top: 2px;
        }
        .win-label { font-size: 6px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
        .win-value { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
        .win-sub   { font-size: 6px; color: rgba(255,255,255,0.35); }
        .win-good  { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .win-mid   { color: var(--gold);       text-shadow: 0 0 8px var(--gold); }
        .win-bad   { color: var(--neon-red);   text-shadow: 0 0 8px var(--neon-red); }

        /* Confidence bar */
        .conf-row {
            display: flex; align-items: center; gap: 5px;
            width: 100%; padding: 0 4px;
        }
        .conf-label { font-size: 6px; color: rgba(0,242,254,0.4); letter-spacing: 1px; white-space: nowrap; }
        .conf-bar-track {
            flex: 1; height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px; overflow: hidden;
        }
        .conf-bar-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            transition: width 0.6s ease;
        }
        .conf-pct { font-size: 7px; color: rgba(0,242,254,0.7); font-weight: 700; white-space: nowrap; }

        .blue-panel-footer {
            display: grid; grid-template-columns: 1fr 1fr;
            border-top: 1px solid rgba(0,180,255,0.2);
        }
        .bp-btn {
            padding: 8px 5px; font-size: 8px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; border: none;
            font-family: 'Orbitron', sans-serif; transition: 0.2s;
        }
        .bp-btn-execute { background: linear-gradient(135deg, rgba(0,100,255,0.6), rgba(0,50,150,0.8)); color: var(--neon-cyan); border-right: 1px solid rgba(0,180,255,0.2); }
        .bp-btn-hide    { background: linear-gradient(135deg, rgba(0,30,80,0.6), rgba(0,10,40,0.8)); color: rgba(0,180,255,0.7); }
        .bp-btn:active  { opacity: 0.7; }
        .period-display-blue {
            background: rgba(0,0,0,0.4); padding: 4px 8px;
            font-size: 8px; color: rgba(0,242,254,0.5);
            letter-spacing: 1px; text-align: center;
            border-top: 1px solid rgba(0,180,255,0.15);
        }

        /* ===== VIOLET PANEL ===== */
        #violet-panel {
            display: none; position: fixed;
            z-index: 10001; touch-action: none;
            cursor: move; width: 200px;
        }
        .violet-panel-inner {
            background: linear-gradient(135deg, rgba(60,0,120,0.88) 0%, rgba(30,0,80,0.92) 100%);
            border: 1.5px solid rgba(180,0,255,0.5); border-radius: 14px; overflow: hidden;
            box-shadow: 0 0 20px rgba(150,0,255,0.5), 0 0 40px rgba(80,0,200,0.3), inset 0 0 15px rgba(0,0,0,0.3);
        }
        .violet-panel-header {
            background: linear-gradient(90deg, rgba(100,0,200,0.7), rgba(150,0,255,0.4));
            padding: 7px 12px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(180,0,255,0.3);
        }
        .violet-panel-title {
            font-size: 9px; font-weight: 700; color: #d08fff;
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 8px #bf00ff;
        }
        .violet-panel-body {
            padding: 10px 12px; text-align: center;
            min-height: 130px; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; gap: 5px;
        }

        /* ===== DUAL NUMBER DISPLAY ===== */
        .dual-num-container {
            display: flex; align-items: center;
            justify-content: center; gap: 6px;
            width: 100%; margin: 4px 0;
        }
        .dual-num-box {
            display: flex; flex-direction: column;
            align-items: center; padding: 6px 10px 7px;
            border-radius: 10px; position: relative;
            flex: 1; min-width: 0;
        }
        .red-box   { background: rgba(255,51,102,0.08); border: 1px solid rgba(255,51,102,0.3); }
        .green-box { background: rgba(0,255,136,0.08);  border: 1px solid rgba(0,255,136,0.3); }
        .primary-box.red-box   { border: 2px solid rgba(255,51,102,0.75); box-shadow: 0 0 14px rgba(255,51,102,0.25), inset 0 0 10px rgba(255,51,102,0.05); }
        .primary-box.green-box { border: 2px solid rgba(0,255,136,0.75);  box-shadow: 0 0 14px rgba(0,255,136,0.25),  inset 0 0 10px rgba(0,255,136,0.05); }
        .dual-num-value  { font-size: 42px; font-weight: 900; line-height: 1; text-shadow: 0 0 18px currentColor, 0 0 35px currentColor; }
        .dual-num-label  { font-size: 6.5px; letter-spacing: 1.5px; opacity: 0.75; margin-top: 3px; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        .red-box   .dual-num-label { color: var(--neon-red); }
        .green-box .dual-num-label { color: var(--neon-green); }
        .primary-badge { font-size: 6px; letter-spacing: 1px; padding: 1px 6px; border-radius: 8px; margin-bottom: 2px; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
        .red-box   .primary-badge { color: var(--neon-red);   background: rgba(255,51,102,0.2); border: 1px solid rgba(255,51,102,0.35); }
        .green-box .primary-badge { color: var(--neon-green); background: rgba(0,255,136,0.2);  border: 1px solid rgba(0,255,136,0.35); }
        .dual-num-sep { color: rgba(255,255,255,0.15); font-size: 18px; flex-shrink: 0; }
        .size-badge-row { display: flex; justify-content: center; gap: 5px; margin: 2px 0; }

        /* Tags */
        .num-tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .num-tag  { font-size: 7px; padding: 2px 7px; border-radius: 10px; font-weight: 700; letter-spacing: 1px; }
        .num-tag-big    { background: rgba(255,111,0,0.25);  color: var(--neon-orange); border: 1px solid rgba(255,111,0,0.4); }
        .num-tag-small  { background: rgba(0,242,254,0.15);  color: var(--neon-cyan);   border: 1px solid rgba(0,242,254,0.3); }
        .num-tag-green  { background: rgba(0,255,136,0.15);  color: var(--neon-green);  border: 1px solid rgba(0,255,136,0.3); }
        .num-tag-red    { background: rgba(255,51,102,0.15); color: var(--neon-red);    border: 1px solid rgba(255,51,102,0.3); }
        .num-tag-violet { background: rgba(191,0,255,0.15);  color: #d08fff;            border: 1px solid rgba(191,0,255,0.3); }

        .violet-panel-footer { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid rgba(180,0,255,0.2); }
        .vp-btn { padding: 8px 5px; font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        .vp-btn-execute { background: linear-gradient(135deg, rgba(100,0,200,0.6), rgba(60,0,120,0.8)); color: #d08fff; border-right: 1px solid rgba(180,0,255,0.2); }
        .vp-btn-hide    { background: linear-gradient(135deg, rgba(40,0,80,0.6), rgba(20,0,50,0.8)); color: rgba(180,0,255,0.7); }
        .vp-btn:active  { opacity: 0.7; }
        .period-display-violet {
            background: rgba(0,0,0,0.4); padding: 4px 8px;
            font-size: 8px; color: rgba(180,0,255,0.5);
            letter-spacing: 1px; text-align: center;
            border-top: 1px solid rgba(180,0,255,0.15);
        }

        /* Common decorative */
        .scanline {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none; border-radius: 14px;
        }
        .corner-tl, .corner-br { position: absolute; width: 12px; height: 12px; pointer-events: none; }
        .corner-tl { top: 6px; left: 6px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
        .corner-br { bottom: 6px; right: 6px; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }

        /* Progress bar */
        .ready-progress { width: 80%; height: 3px; background: rgba(0,242,254,0.15); border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .ready-progress-bar { height: 100%; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); animation: progressScan 1.2s linear infinite; }
        @keyframes progressScan { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }

        .analyzing-dots { animation: blink 0.8s ease-in-out infinite; }

        /* Number color classes */
        .num-color-green  { color: #00ff88; }
        .num-color-red    { color: #ff3366; }
        .num-color-violet { color: #bf00ff; }
    </style>
</head>
<body>

    <!-- ENTRY SCREEN -->
    <div id="entry-screen">
        <div class="entry-bg-glow"></div>
        <div class="entry-title">WINGO PREDICTION TOOL</div>
        <div class="entry-logo">TASHAN<br>ELITE MODZ</div>

        <div class="phone-wrapper" onclick="initiateVideoSequence()">
            <div class="phone-neon-ring"></div>
            <div class="phone-frame">
                <div class="phone-notch"></div>

    <script>
        // ============================================================
        //   GLOBAL CONSTANTS & VARIABLES
        // ============================================================
        const API_URL   = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
        const GAME_LINK = "https://www.tashanok.app/#/register?invitationCode=13413405256";

        const NUM_PROPS = {
            0: { size: 'SMALL', color: 'RED',   extra: 'VIOLET' },
            1: { size: 'SMALL', color: 'GREEN',  extra: null     },
            2: { size: 'SMALL', color: 'RED',    extra: null     },
            3: { size: 'SMALL', color: 'GREEN',  extra: null     },
            4: { size: 'SMALL', color: 'RED',    extra: null     },
            5: { size: 'BIG',   color: 'GREEN',  extra: 'VIOLET' },
            6: { size: 'BIG',   color: 'RED',    extra: null     },
            7: { size: 'BIG',   color: 'GREEN',  extra: null     },
            8: { size: 'BIG',   color: 'RED',    extra: null     },
            9: { size: 'BIG',   color: 'GREEN',  extra: null     }
        };

        const POOLS = {
            SMALL_RED:   [0, 2, 4],
            SMALL_GREEN: [1, 3],
            BIG_RED:     [6, 8],
            BIG_GREEN:   [5, 7, 9]
        };

        let historyResults    = [];
        let predictionLog     = [];
        let currentPrediction = null;
        let nextPeriodId      = null;
        let lastKnownPeriod   = null;
        let apiInterval       = null;
        let predictionReady   = false;
        let videoSequenceActive = false;

        let blueDragState   = { dragging:false, startX:0, startY:0, origX:0, origY:0, moved:false };
        let violetDragState = { dragging:false, startX:0, startY:0, origX:0, origY:0, moved:false };
        let circleDragState = { dragging:false, xOff:0, yOff:0, startX:0, startY:0, moved:false };

        // ============================================================
        //   PATTERN DETECTION ENGINE  (7 Pattern Types)
        // ============================================================

        /**
         * PATTERN TYPES:
         * 1. STRONG_CONTINUATION  — 3+ same → ek aur same
         * 2. REVERSAL             — 5+ same → opposite (extreme streak break)
         * 3. ZIGZAG               — alternate B-S-B-S → continue alternate
         * 4. CLUSTER              — BB-SS-BB → pair grouping
         * 5. TRAP                 — Looks like zigzag but suddenly same repeats
         * 6. SUDDEN_FLIP          — Long streak breaks momentum completely
         * 7. MIXED_NOISE          — No pattern → SKIP (low confidence)
         */
        function detectPattern(sizes) {
            const n = sizes.length;
            if (n < 4) return { type: 'MIXED_NOISE', conf: 40, predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG', skip: true };

            // ---- Current streak ----
            let streak = 1;
            for (let i = 1; i < n; i++) {
                if (sizes[i] === sizes[0]) streak++;
                else break;
            }

            // ---- Last 15 for deeper pattern check ----
            const w = sizes.slice(0, Math.min(15, n));

            // ---- Check ZIGZAG: alternating in last 4-6 results ----
            let altCount = 0;
            for (let i = 0; i < Math.min(6, w.length - 1); i++) {
                if (w[i] !== w[i+1]) altCount++;
            }
            const isZigzag = altCount >= 5;   // 5/6 alternating = strong zigzag

            // ---- Check CLUSTER: pairs like BB-SS-BB ----
            // look for 2-2 grouping in last 8
            const c8 = sizes.slice(0, Math.min(8, n));
            let clusterScore = 0;
            for (let i = 0; i < c8.length - 1; i += 2) {
                if (c8[i] === c8[i+1]) clusterScore++;
            }
            const isCluster = clusterScore >= 3; // at least 3 pairs out of 4

            // ---- Check TRAP: looked like zigzag but broke ----
            // Pattern: at least 3 alternating then suddenly SAME twice
            let prevAlt = 0;
            for (let i = 2; i < Math.min(7, n - 1); i++) {
                if (sizes[i] !== sizes[i+1]) prevAlt++;
            }
            const trapSetup = prevAlt >= 2 && streak >= 2 && !isZigzag;

            // ---- Check SUDDEN_FLIP: long streak + now flipped ----
            // After 5+ same, we look at previous block before current streak
            let prevStreak = 0;
            if (n > streak) {
                for (let i = streak; i < n; i++) {
                    if (sizes[i] === sizes[streak]) prevStreak++;
                    else break;
                }
            }
            const isSuddenFlip = prevStreak >= 5 && streak >= 1 && sizes[0] !== sizes[streak];

            // ---- Dominant pattern decision ----

            // REVERSAL: very long streak 5+
            if (streak >= 6) {
                return {
                    type: 'REVERSAL',
                    conf: 80,
                    predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG',
                    skip: false,
                    streakLen: streak,
                    emoji: 'REVERSAL'
                };
            }

            // STRONG_CONTINUATION: streak 3-4
            if (streak >= 3 && streak <= 4 && !isZigzag) {
                // At streak 3-4 → system often continues one more
                return {
                    type: 'STRONG_CONTINUATION',
                    conf: 72,
                    predictSize: sizes[0],
                    skip: false,
                    streakLen: streak,
                    emoji: 'CONTINUATION'
                };
            }

            // SUDDEN_FLIP: after a long opposite streak, momentum break
            if (isSuddenFlip) {
                // Confirm the flip direction (current = new direction)
                return {
                    type: 'SUDDEN_FLIP',
                    conf: 68,
                    predictSize: sizes[0],
                    skip: false,
                    streakLen: streak,
                    emoji: 'FLIP'
                };
            }

            // TRAP: looked like zigzag but broke
            if (trapSetup) {
                // Trap = system continues SAME (breaks expected alternate)
                return {
                    type: 'TRAP',
                    conf: 62,
                    predictSize: sizes[0],   // continue same (trap)
                    skip: false,
                    emoji: 'TRAP'
                };
            }

            // ZIGZAG: strong alternating → next is opposite
            if (isZigzag) {
                return {
                    type: 'ZIGZAG',
                    conf: 67,
                    predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG',
                    skip: false,
                    emoji: 'ZIGZAG'
                };
            }

            // CLUSTER: pair grouping BB-SS-BB-SS
            if (isCluster) {
                // If last 2 are same → next pair likely opposite
                const last2Same = c8[0] === c8[1];
                const prevPairDiff = c8.length >= 4 && c8[2] !== c8[0];
                if (last2Same && prevPairDiff) {
                    return {
                        type: 'CLUSTER',
                        conf: 70,
                        predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG',
                        skip: false,
                        emoji: 'CLUSTER'
                    };
                }
                // Start of new pair → continue same
                return {
                    type: 'CLUSTER',
                    conf: 65,
                    predictSize: sizes[0],
                    skip: false,
                    emoji: 'CLUSTER'
                };
            }

            // Streak of 5 (moderate extreme — could go either way, lean reversal)
            if (streak === 5) {
                return {
                    type: 'REVERSAL',
                    conf: 74,
                    predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG',
                    skip: false,
                    streakLen: streak,
                    emoji: 'REVERSAL'
                };
            }

            // Balance check on last 10
            const s10    = sizes.slice(0, Math.min(10, n));
            const bigCnt = s10.filter(s => s === 'BIG').length;
            const smlCnt = s10.length - bigCnt;

            if (bigCnt >= 7) {
                return { type: 'MIXED_NOISE', conf: 60, predictSize: 'SMALL', skip: false, emoji: 'BALANCE' };
            }
            if (smlCnt >= 7) {
                return { type: 'MIXED_NOISE', conf: 60, predictSize: 'BIG', skip: false, emoji: 'BALANCE' };
            }

            // Pure noise — skip recommended
            return {
                type: 'MIXED_NOISE',
                conf: 42,
                predictSize: sizes[0] === 'BIG' ? 'SMALL' : 'BIG',
                skip: true,
                emoji: 'NOISE'
            };
        }

        // ============================================================
        //   COLOR PATTERN DETECTION
        // ============================================================
        function detectColorPattern(colors) {
            const n = colors.length;
            if (n < 2) return { predictColor: 'GREEN', colorPattern: 'DEFAULT' };

            let streak = 1;
            for (let i = 1; i < n; i++) {
                if (colors[i] === colors[0]) streak++;
                else break;
            }

            const c10      = colors.slice(0, Math.min(10, n));
            const greenCnt = c10.filter(c => c === 'GREEN').length;
            const redCnt   = c10.length - greenCnt;

            if (streak >= 4) {
                return { predictColor: colors[0] === 'GREEN' ? 'RED' : 'GREEN', colorPattern: `${streak}x COLOR BREAK` };
            }
            if (streak === 3) {
                return { predictColor: colors[0] === 'GREEN' ? 'RED' : 'GREEN', colorPattern: `3x COLOR BREAK` };
            }
            if (streak === 2) {
                return { predictColor: colors[0] === 'GREEN' ? 'RED' : 'GREEN', colorPattern: `2x ${colors[0]} SWITCH` };
            }
            if (greenCnt >= 7) return { predictColor: 'RED',   colorPattern: `GREEN HEAVY → RED` };
            if (redCnt   >= 7) return { predictColor: 'GREEN', colorPattern: `RED HEAVY → GREEN` };

            return { predictColor: colors[0] === 'GREEN' ? 'RED' : 'GREEN', colorPattern: 'COLOR BALANCE' };
        }

        // ============================================================
        //   MAIN ANALYZE & PREDICT
        // ============================================================
        function analyzeAndPredict(history) {
            if (history.length < 3) return null;

            const h      = history.slice(0, Math.min(25, history.length));
            const sizes  = h.map(r => r.size);
            const colors = h.map(r => r.color);
            const nums   = h.map(r => r.number);

            // ---- Detect size pattern ----
            const patternResult = detectPattern(sizes);
            let { predictSize, type: patternType, conf: sizeConf, skip, streakLen, emoji } = patternResult;

            // ---- Loss flip: if last 3 predictions all wrong → flip ----
            if (predictionLog.length >= 3) {
                const last3  = predictionLog.slice(0, 3);
                const wrongs = last3.filter(p => !p.correct).length;
                if (wrongs === 3) {
                    predictSize  = predictSize === 'BIG' ? 'SMALL' : 'BIG';
                    patternType  = 'LOSS_FLIP';
                    sizeConf     = Math.min(sizeConf + 12, 88);
                    skip         = false;
                    emoji        = 'FLIP';
                }
            }

            // ---- Color pattern ----
            const { predictColor, colorPattern } = detectColorPattern(colors);

            // ---- Number selection ----
            function lastSeenIdx(n) {
                const idx = nums.indexOf(n);
                return idx === -1 ? 99 : idx;
            }

            const redPool   = predictSize === 'BIG' ? POOLS.BIG_RED   : POOLS.SMALL_RED;
            const greenPool = predictSize === 'BIG' ? POOLS.BIG_GREEN : POOLS.SMALL_GREEN;

            const redSorted   = [...redPool].sort(  (a, b) => lastSeenIdx(b) - lastSeenIdx(a));
            const greenSorted = [...greenPool].sort((a, b) => lastSeenIdx(b) - lastSeenIdx(a));

            const redPick   = redSorted[0];
            const greenPick = greenSorted[0];
            const primary   = predictColor === 'RED' ? redPick : greenPick;
            const secondary = predictColor === 'RED' ? greenPick : redPick;

            // ---- Last 8 dots for trend display ----
            const trendDots = sizes.slice(0, Math.min(8, sizes.length)).reverse();

            // ---- Confidence boost if pattern is very clear ----
            let finalConf = sizeConf;
            if (patternType === 'REVERSAL' && streakLen >= 7) finalConf = Math.min(finalConf + 6, 90);

            // ---- Pattern label text ----
            const patternLabels = {
                STRONG_CONTINUATION: `${streakLen || ''}x STREAK → CONTINUE`,
                REVERSAL:            `${streakLen || '5'}x STREAK → BREAK`,
                ZIGZAG:              'ZIGZAG → NEXT OPPOSITE',
                CLUSTER:             'CLUSTER PAIR → SWITCH',
                TRAP:                'TRAP ALERT → SAME AGAIN',
                SUDDEN_FLIP:         'FLIP MOMENTUM',
                MIXED_NOISE:         'MIXED — LOW SIGNAL',
                LOSS_FLIP:           '3x LOSS → FLIP LOGIC'
            };

            const sizePattern = patternLabels[patternType] || patternType;

            return {
                predictSize,
                predictColor,
                sizePattern,
                colorPattern,
                sizeConf: finalConf,
                patternType,
                skip: !!skip,
                trendDots,
                redPick,
                greenPick,
                primary,
                secondary
            };
        }

        // ============================================================
        //   VIDEO SEQUENCE
        // ============================================================
        function initiateVideoSequence() {
            if (videoSequenceActive) return;
            videoSequenceActive = true;

            const videoOverlay = document.getElementById('video-overlay');
            const videoElem    = document.getElementById('fullscreen-video');

            videoOverlay.style.display = 'flex';
            videoElem.muted    = false;
            videoElem.autoplay = false;
            videoElem.controls = false;

            const playPromise = videoElem.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => videoElem.play().catch(() => {}));
            }

            const onVideoEnd = () => {
                videoOverlay.style.display = 'none';
                videoElem.pause();
                videoElem.currentTime = 0;
                videoElem.removeEventListener('ended', onVideoEnd);
                videoElem.removeEventListener('error', onVideoError);
                startApp();
                videoSequenceActive = false;
            };

            const onVideoError = () => {
                videoOverlay.style.display = 'none';
                startApp();
                videoSequenceActive = false;
            };

            videoElem.addEventListener('ended', onVideoEnd);
            videoElem.addEventListener('error', onVideoError);
        }

        // ============================================================
        //   APP START
        // ============================================================
        function startApp() {
            document.getElementById('entry-screen').style.display = 'none';
            const iframe = document.getElementById('game-frame');
            iframe.src   = GAME_LINK;
            iframe.style.display = 'block';

            const fc = document.getElementById('floating-circle');
            fc.style.display = 'block';
            setupCircleDrag();

            showPanels();
            fetchAPI();
            if (apiInterval) clearInterval(apiInterval);
            apiInterval = setInterval(fetchAPI, 3000);
        }

        function showPanels() {
            const bp = document.getElementById('blue-panel');
            const vp = document.getElementById('violet-panel');
            bp.style.display = 'block';
            bp.style.top  = '15%';
            bp.style.left = '5%';
            vp.style.display = 'block';
            vp.style.top   = '15%';
            vp.style.right = '5%';
            vp.style.left  = 'auto';
            showReadyState();
        }

        function showReadyState() {
            predictionReady = false;
            document.getElementById('blue-body').innerHTML = `
                <div class="ready-text">READY</div>
                <div class="system-online-text">SYSTEM ONLINE</div>
                <div class="ready-progress"><div class="ready-progress-bar"></div></div>
            `;
            document.getElementById('violet-body').innerHTML = `
                <div class="ready-text" style="font-size:22px;">READY</div>
                <div class="system-online-text">SYSTEM ONLINE</div>
                <div class="ready-progress"><div class="ready-progress-bar"></div></div>
            `;
            setTimeout(doPrediction, 3500);
        }

        // ============================================================
        //   API FETCH
        // ============================================================
        async function fetchAPI() {
            try {
                const res  = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();

                if (data && data.data && data.data.list && data.data.list.length > 0) {
                    const list         = data.data.list;
                    const latestPeriod = list[0].issueNumber;
                    const nextPeriod   = (BigInt(latestPeriod) + 1n).toString();

                    nextPeriodId = nextPeriod;
                    document.getElementById('blue-period').textContent  = nextPeriod;
                    document.getElementById('violet-period').textContent = nextPeriod;

                    if (lastKnownPeriod && latestPeriod !== lastKnownPeriod) {
                        checkLastPrediction(list[0]);
                        updateHistory(list);
                        if (predictionReady) doPrediction();
                    } else if (!lastKnownPeriod) {
                        updateHistory(list);
                    }

                    lastKnownPeriod = latestPeriod;
                }
            } catch(e) { console.error(e); }
        }

        function updateHistory(list) {
            list.forEach(item => {
                const num    = parseInt(item.number);
                const period = item.issueNumber;
                if (!historyResults.find(r => r.period === period)) {
                    historyResults.unshift({
                        period,
                        number: num,
                        size  : NUM_PROPS[num].size,
                        color : NUM_PROPS[num].color,
                        extra : NUM_PROPS[num].extra
                    });
                }
            });
            if (historyResults.length > 200) historyResults = historyResults.slice(0, 200);
        }

        function checkLastPrediction(latestItem) {
            if (!currentPrediction) return;
            const num     = parseInt(latestItem.number);
            const actual  = NUM_PROPS[num].size;
            const correct = currentPrediction.predictSize === actual;
            predictionLog.unshift({ predicted: currentPrediction.predictSize, actual, correct, period: latestItem.issueNumber });
            if (predictionLog.length > 20) predictionLog.pop();
        }

        // ============================================================
        //   PREDICTION TRIGGER
        // ============================================================
        function doPrediction() {
            if (historyResults.length < 3) {
                showAnalyzing();
                setTimeout(doPrediction, 2000);
                return;
            }

            const analysis = analyzeAndPredict(historyResults);
            if (!analysis) {
                showAnalyzing();
                setTimeout(doPrediction, 2000);
                return;
            }

            currentPrediction = analysis;
            showPredictionState(analysis);
            predictionReady = true;
        }

        function showAnalyzing() {
            document.getElementById('blue-body').innerHTML = `
                <div class="analyzing-dots" style="font-size:11px; color:var(--neon-cyan); letter-spacing:2px;">ANALYZING...</div>
                <div class="ready-progress"><div class="ready-progress-bar"></div></div>
            `;
            document.getElementById('violet-body').innerHTML = `
                <div class="analyzing-dots" style="font-size:11px; color:#d08fff; letter-spacing:2px;">SCANNING...</div>
                <div class="ready-progress"><div class="ready-progress-bar"></div></div>
            `;
        }

        // ============================================================
        //   DISPLAY — Blue panel & Violet panel
        // ============================================================

        // Pattern type → CSS class
        const PATTERN_CSS = {
            STRONG_CONTINUATION: 'pattern-continuation',
            REVERSAL:            'pattern-reversal',
            ZIGZAG:              'pattern-zigzag',
            CLUSTER:             'pattern-cluster',
            TRAP:                'pattern-trap',
            SUDDEN_FLIP:         'pattern-flip',
            MIXED_NOISE:         'pattern-noise',
            LOSS_FLIP:           'pattern-trap'
        };

        // Pattern type → Icon
        const PATTERN_ICON = {
            STRONG_CONTINUATION: 'fa-arrow-right',
            REVERSAL:            'fa-rotate-left',
            ZIGZAG:              'fa-wave-square',
            CLUSTER:             'fa-layer-group',
            TRAP:                'fa-triangle-exclamation',
            SUDDEN_FLIP:         'fa-bolt',
            MIXED_NOISE:         'fa-ban',
            LOSS_FLIP:           'fa-bolt'
        };

        function showPredictionState(pred) {

            // ---- Win/Loss tracker ----
            const totalPreds = predictionLog.length;
            const wins       = predictionLog.filter(p => p.correct).length;
            let winBarHTML   = '';
            if (totalPreds > 0) {
                const winPct = Math.round(wins / totalPreds * 100);
                const cls    = winPct >= 60 ? 'win-good' : winPct >= 40 ? 'win-mid' : 'win-bad';
                winBarHTML = `
                    <div class="win-stat">
                        <span class="win-label">WIN RATE</span>
                        <span class="win-value ${cls}">${winPct}%</span>
                        <span class="win-sub">${wins}/${totalPreds}</span>
                    </div>
                `;
            }

            // ---- Confidence bar ----
            const confHTML = `
                <div class="conf-row">
                    <span class="conf-label">CONF</span>
                    <div class="conf-bar-track">
                        <div class="conf-bar-fill" style="width:${pred.sizeConf}%"></div>
                    </div>
                    <span class="conf-pct">${pred.sizeConf}%</span>
                </div>
            `;

            // ---- Pattern badge ----
            const pCss  = PATTERN_CSS[pred.patternType]  || 'pattern-noise';
            const pIcon = PATTERN_ICON[pred.patternType] || 'fa-chart-bar';
            const patternBadgeHTML = `<div class="pattern-badge ${pCss}"><i class="fas ${pIcon}"></i> ${pred.sizePattern}</div>`;

            // ---- SKIP WARNING if noise ----
            const skipHTML = pred.skip
                ? `<div class="skip-warning"><i class="fas fa-ban"></i> SKIP — NO CLEAR PATTERN</div>`
                : '';

            // ---- Trend dots (last 8 results) ----
            const dotHTML = pred.trendDots.map(s =>
                `<span class="trend-dot ${s === 'BIG' ? 'td-big' : 'td-small'}" title="${s}"></span>`
            ).join('');
            const trendHTML = `<div class="trend-row">${dotHTML}</div>`;

            // ---- Blue panel ----
            document.getElementById('blue-body').innerHTML = `
                <div class="pred-label">PREDICTION</div>
                <div class="pred-big-small ${pred.predictSize}">${pred.predictSize}</div>
                ${patternBadgeHTML}
                ${skipHTML}
                ${trendHTML}
                <div class="color-analysis-line"><i class="fas fa-circle" style="font-size:5px;color:${pred.predictColor === 'RED' ? 'var(--neon-red)' : 'var(--neon-green)'}"></i>&nbsp;${pred.colorPattern}</div>
                ${confHTML}
                ${winBarHTML}
                <div class="data-injected-badge"><i class="fas fa-check-circle"></i><span>PATTERN ANALYZED</span></div>
            `;

            // ---- Violet panel — 2-number display ----
            const isRedPrimary = pred.predictColor === 'RED';
            const redExtra     = NUM_PROPS[pred.redPick].extra;
            const greenExtra   = NUM_PROPS[pred.greenPick].extra;

            const redLabel   = 'RED'   + (redExtra   === 'VIOLET' ? '+VIO' : '');
            const greenLabel = 'GREEN' + (greenExtra === 'VIOLET' ? '+VIO' : '');

            const redBoxClass   = 'dual-num-box red-box'   + (isRedPrimary  ? ' primary-box' : '');
            const greenBoxClass = 'dual-num-box green-box' + (!isRedPrimary ? ' primary-box' : '');

            const redBadge   = isRedPrimary  ? '<div class="primary-badge">&#9733; MAIN</div>' : '';
            const greenBadge = !isRedPrimary ? '<div class="primary-badge">&#9733; MAIN</div>' : '';

            // Pattern mini badge for violet
            const vPBadge = `<div class="pattern-badge ${pCss}" style="font-size:7px;">${pred.patternType.replace('_',' ')}</div>`;

            document.getElementById('violet-body').innerHTML = `
                <div class="pred-label">NUMBER PREDICTION</div>
                <div class="dual-num-container">
                    <div class="${redBoxClass}">
                        ${redBadge}
                        <div class="dual-num-value num-color-red">${pred.redPick}</div>
                        <div class="dual-num-label">${redLabel}</div>
                    </div>
                    <div class="dual-num-sep">|</div>
                    <div class="${greenBoxClass}">
                        ${greenBadge}
                        <div class="dual-num-value num-color-green">${pred.greenPick}</div>
                        <div class="dual-num-label">${greenLabel}</div>
                    </div>
                </div>
                <div class="size-badge-row">
                    <span class="num-tag num-tag-${pred.predictSize.toLowerCase()}">${pred.predictSize}</span>
                    <span class="num-tag num-tag-${pred.predictColor.toLowerCase()}">${pred.predictColor} MAIN</span>
                </div>
                ${vPBadge}
                ${pred.skip ? `<div class="skip-warning" style="font-size:7px;"><i class="fas fa-ban"></i> LOW CONF</div>` : ''}
                <div class="data-injected-badge"><i class="fas fa-check-circle"></i><span>DATA INJECTED</span></div>
            `;
        }

        // ============================================================
        //   BUTTON ACTIONS
        // ============================================================
        function forceNewPrediction()      { showReadyState(); }
        function hideBluePanelToCircle()   { document.getElementById('blue-panel').style.display   = 'none'; }
        function hideVioletPanelToCircle() { document.getElementById('violet-panel').style.display = 'none'; }

        // ============================================================
        //   FLOATING CIRCLE TOGGLE
        // ============================================================
        document.getElementById('floating-circle').addEventListener('click', function(e) {
            if (circleDragState.moved) { circleDragState.moved = false; return; }
            const bp = document.getElementById('blue-panel');
            const vp = document.getElementById('violet-panel');
            if (bp.style.display === 'none' && vp.style.display === 'none') {
                bp.style.display = 'block';
                vp.style.display = 'block';
            } else {
                bp.style.display = 'none';
                vp.style.display = 'none';
            }
        });

        // ============================================================
        //   DRAG — Circle
        // ============================================================
        function setupCircleDrag() {
            const el = document.getElementById('floating-circle');
            el.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                circleDragState.startX = t.clientX;
                circleDragState.startY = t.clientY;
                const rect = el.getBoundingClientRect();
                circleDragState.origX  = rect.left;
                circleDragState.origY  = rect.top;
                circleDragState.moved  = false;
            }, { passive: true });
            el.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t  = e.touches[0];
                const dx = t.clientX - circleDragState.startX;
                const dy = t.clientY - circleDragState.startY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) circleDragState.moved = true;
                el.style.right = 'auto';
                el.style.left  = (circleDragState.origX + dx) + 'px';
                el.style.top   = (circleDragState.origY + dy) + 'px';
            }, { passive: false });
        }

        // ============================================================
        //   DRAG — Panels
        // ============================================================
        function setupPanelDrag(panelId, state) {
            const el = document.getElementById(panelId);
            el.addEventListener('touchstart', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const t   = e.touches[0];
                state.startX = t.clientX; state.startY = t.clientY;
                const rect   = el.getBoundingClientRect();
                state.origX  = rect.left;  state.origY  = rect.top;
                state.moved  = false;
            }, { passive: true });
            el.addEventListener('touchmove', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                e.preventDefault();
                const t  = e.touches[0];
                const dx = t.clientX - state.startX;
                const dy = t.clientY - state.startY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) state.moved = true;
                el.style.right = 'auto';
                el.style.left  = (state.origX + dx) + 'px';
                el.style.top   = (state.origY + dy) + 'px';
            }, { passive: false });
            el.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                state.dragging = true; state.moved = false;
                state.startX   = e.clientX; state.startY = e.clientY;
                const rect     = el.getBoundingClientRect();
                state.origX    = rect.left; state.origY = rect.top;
            });
            document.addEventListener('mousemove', (e) => {
                if (!state.dragging) return;
                const dx = e.clientX - state.startX;
                const dy = e.clientY - state.startY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) state.moved = true;
                el.style.right = 'auto';
                el.style.left  = (state.origX + dx) + 'px';
                el.style.top   = (state.origY + dy) + 'px';
            });
            document.addEventListener('mouseup', () => { state.dragging = false; });
        }

        setupPanelDrag('blue-panel',   blueDragState);
        setupPanelDrag('violet-panel', violetDragState);
    </script>
</body>
</html>
