<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TASHAN ELITE MODZ | PREDICTION SUITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan:   #00f2fe;
            --green:  #00ff88;
            --red:    #ff3366;
            --orange: #ff6f00;
            --purple: #bf00ff;
            --gold:   #FFD700;
            --blue:   #0066ff;
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body,html { height:100%; width:100%; background:#000; overflow:hidden; color:#fff; font-family:'Orbitron',sans-serif; }

        /* ── ENTRY ─────────────────────────────────────────── */
        #entry-screen {
            position:fixed; width:100%; height:100%;
            background:radial-gradient(ellipse at center,#0a0020 0%,#000 70%);
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            z-index:9999;
        }
        .entry-bg-glow { position:absolute; width:300px; height:300px; background:radial-gradient(circle,rgba(100,0,255,0.25) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-60%); pointer-events:none; }
        .entry-title { font-size:13px; font-weight:700; color:var(--cyan); letter-spacing:4px; text-transform:uppercase; text-shadow:0 0 10px var(--cyan); margin-bottom:6px; }
        .entry-logo  { font-size:28px; font-weight:900; color:#fff; text-shadow:0 0 20px var(--purple),0 0 40px var(--blue); letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; text-align:center; }
        .phone-wrapper { position:relative; margin-top:20px; cursor:pointer; transition:transform .2s; }
        .phone-wrapper:active { transform:scale(0.97); }
        .phone-frame { width:200px; height:360px; background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460); border-radius:34px; border:3px solid rgba(0,242,254,0.5); box-shadow:0 0 0 1px rgba(0,242,254,0.2),0 0 30px rgba(0,100,255,0.4),0 0 60px rgba(100,0,255,0.2),inset 0 0 20px rgba(0,0,0,0.5); position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; }
        .phone-notch  { width:60px; height:10px; background:#000; border-radius:0 0 10px 10px; margin-top:8px; flex-shrink:0; }
        .phone-screen { width:100%; flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#000; }
        .phone-screen img { width:100%; height:100%; object-fit:cover; object-position:top; }
        .phone-home-bar { width:60px; height:4px; background:rgba(255,255,255,0.3); border-radius:2px; margin:8px 0; flex-shrink:0; }
        .phone-btn-right { position:absolute; right:-5px; top:80px; width:4px; height:50px; background:linear-gradient(to bottom,#333,#555,#333); border-radius:2px; }
        .phone-btn-left1 { position:absolute; left:-5px; top:70px;  width:4px; height:25px; background:linear-gradient(to bottom,#333,#555,#333); border-radius:2px; }
        .phone-btn-left2 { position:absolute; left:-5px; top:105px; width:4px; height:35px; background:linear-gradient(to bottom,#333,#555,#333); border-radius:2px; }
        .phone-neon-ring { position:absolute; width:220px; height:380px; border-radius:38px; border:1px solid rgba(0,242,254,0.15); pointer-events:none; animation:ringPulse 2s ease-in-out infinite; }
        @keyframes ringPulse { 0%,100%{box-shadow:0 0 15px rgba(0,242,254,0.2);opacity:.6} 50%{box-shadow:0 0 30px rgba(0,242,254,0.5);opacity:1} }
        .click-hint { margin-top:16px; font-size:10px; color:var(--cyan); letter-spacing:3px; text-transform:uppercase; animation:blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

        /* ── VIDEO ─────────────────────────────────────────── */
        #video-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:20000; display:none; justify-content:center; align-items:center; }
        #fullscreen-video { width:100%; height:100%; object-fit:cover; }
        .video-glow-text { position:absolute; bottom:12%; left:0; right:0; text-align:center; font-size:9px; letter-spacing:3px; color:rgba(0,242,254,0.5); pointer-events:none; z-index:20001; text-transform:uppercase; animation:pulseT 1.8s infinite; }
        @keyframes pulseT { 0%{opacity:.2} 100%{opacity:.8} }

        /* ── IFRAME ────────────────────────────────────────── */
        #game-frame { display:none; position:fixed; top:0; left:0; width:100%; height:100%; border:none; z-index:100; }

        /* ── FLOATING CIRCLE ───────────────────────────────── */
        #floating-circle { display:none; position:fixed; top:70%; right:20px; width:65px; height:65px; z-index:10000; cursor:move; touch-action:none; border-radius:50%; background:url('mickey.png') no-repeat center/cover; background-color:#000; border:2px solid var(--cyan); animation:floatGlow 2s ease-in-out infinite; }
        @keyframes floatGlow { 0%,100%{box-shadow:0 0 15px rgba(0,242,254,0.6),0 0 30px rgba(0,100,255,0.3)} 50%{box-shadow:0 0 25px rgba(0,242,254,0.9),0 0 50px rgba(100,0,255,0.5)} }

        /* ── WIN OVERLAY ───────────────────────────────────── */
        #win-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; pointer-events:none; justify-content:center; align-items:center; }
        .win-anim-box { text-align:center; background:rgba(0,0,0,0.78); border-radius:22px; padding:26px 44px; border:2px solid rgba(255,215,0,0.65); box-shadow:0 0 50px rgba(255,215,0,0.5),0 0 100px rgba(255,215,0,0.15); animation:winIn .4s cubic-bezier(.175,.885,.32,1.275); }
        @keyframes winIn { from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1} }
        #win-emoji { font-size:52px; display:block; }
        #win-text  { font-size:18px; font-weight:900; color:var(--gold); text-shadow:0 0 20px var(--gold); letter-spacing:3px; margin-top:8px; }

        /* ── BLUE PANEL ────────────────────────────────────── */
        #blue-panel { display:none; position:fixed; z-index:10001; touch-action:none; cursor:move; width:262px; }
        .bp-inner {
            background:linear-gradient(135deg,rgba(0,18,55,0.55) 0%,rgba(0,6,35,0.62) 100%);
            border:1.5px solid rgba(0,180,255,0.42); border-radius:14px; overflow:hidden;
            box-shadow:0 0 24px rgba(0,100,255,0.38),inset 0 0 15px rgba(0,0,0,0.15);
            backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
        }

        /* Header */
        .bp-hdr { background:linear-gradient(90deg,rgba(0,80,200,0.48),rgba(0,150,255,0.25)); padding:7px 10px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,180,255,0.22); }
        .bp-title { font-size:9px; font-weight:700; color:var(--cyan); letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 8px var(--cyan); }

        /* Scan btn - HIDDEN (removed) */
        #scan-file-input { display:none; }
        #scan-lbl { display:none; }
        .si { font-size:8px; color:rgba(0,242,254,0.75); }
        .st { font-size:6px; color:rgba(0,242,254,0.7); letter-spacing:1px; }

        /* Body */
        .bp-body { padding:10px 12px; display:flex; flex-direction:column; align-items:center; gap:7px; }

        /* ── LOCKED ── */
        .lock-ico  { font-size:40px; color:rgba(0,180,255,0.65); text-shadow:0 0 20px rgba(0,180,255,0.6); animation:lockP 2s ease-in-out infinite; }
        @keyframes lockP { 0%,100%{text-shadow:0 0 15px rgba(0,180,255,0.4)} 50%{text-shadow:0 0 35px rgba(0,180,255,1),0 0 60px rgba(0,100,255,0.5)} }
        .lock-title { font-size:11px; font-weight:700; color:var(--cyan); letter-spacing:2px; text-align:center; text-shadow:0 0 8px var(--cyan); }
        .lock-desc  { font-size:8px; color:rgba(0,210,255,0.6); letter-spacing:1px; text-align:center; line-height:1.7; font-family:'Rajdhani',sans-serif; font-weight:600; }
        .lock-upload { display:flex; align-items:center; gap:7px; cursor:pointer; background:linear-gradient(135deg,rgba(0,100,255,0.38),rgba(0,50,200,0.5)); border:1.5px solid rgba(0,180,255,0.6); border-radius:10px; padding:9px 18px; font-family:'Orbitron',sans-serif; -webkit-tap-highlight-color:transparent; animation:uploadP 1.5s ease-in-out infinite; }
        @keyframes uploadP { 0%,100%{box-shadow:0 0 8px rgba(0,180,255,0.3)} 50%{box-shadow:0 0 20px rgba(0,180,255,0.9)} }
        .lock-upload:active { transform:scale(0.96); }
        .lu-ico { font-size:15px; color:var(--cyan); }
        .lu-txt { font-size:9px; font-weight:700; color:var(--cyan); letter-spacing:2px; }
        .lock-hint { font-size:7px; color:rgba(0,200,255,0.3); letter-spacing:1px; text-align:center; font-family:'Rajdhani',sans-serif; line-height:1.5; }
        #activate-file-input { display:none; }

        /* ── CHECKING ── */
        .check-spin { font-size:30px; color:var(--gold); animation:spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .check-lbl { font-size:9px; color:var(--gold); letter-spacing:2px; animation:blink .7s ease-in-out infinite; }

        /* ── ERROR ── */
        .err-ico   { font-size:32px; color:var(--red); text-shadow:0 0 15px var(--red); }
        .err-title { font-size:10px; font-weight:700; color:var(--red); letter-spacing:1px; text-align:center; }
        .err-sub   { font-size:8px; color:rgba(255,100,100,0.7); text-align:center; font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:1px; line-height:1.6; }
        .err-retry { cursor:pointer; background:rgba(255,51,102,0.18); border:1px solid rgba(255,51,102,0.45); border-radius:8px; padding:5px 14px; font-size:8px; color:var(--red); letter-spacing:1px; font-family:'Orbitron',sans-serif; -webkit-tap-highlight-color:transparent; }

        /* ── ACTIVE — BALANCE ── */
        .bal-row { display:flex; align-items:center; justify-content:space-between; width:100%; background:rgba(0,0,0,0.28); border-radius:8px; padding:5px 10px; border:1px solid rgba(0,255,136,0.18); }
        .bal-l { font-size:7px; color:rgba(0,255,136,0.55); letter-spacing:1px; margin-bottom:1px; }
        .bal-v { font-size:17px; font-weight:900; color:var(--green); text-shadow:0 0 10px var(--green); letter-spacing:1px; }
        .bal-r { text-align:right; }
        .bal-wl { font-size:6px; color:rgba(255,215,0,0.45); letter-spacing:1px; font-family:'Rajdhani',sans-serif; }
        .bal-streak { font-size:7px; color:var(--gold); font-family:'Rajdhani',sans-serif; font-weight:700; }

        /* ── ACTIVE — PREDICTION ── */
        .pred-sec { width:100%; background:rgba(0,0,0,0.22); border-radius:8px; padding:7px 10px; border:1px solid rgba(0,180,255,0.18); }
        .pred-row { display:flex; align-items:center; justify-content:space-between; }
        .pred-lbl { font-size:7px; color:rgba(0,242,254,0.5); letter-spacing:1px; }
        .pred-val { font-size:22px; font-weight:900; letter-spacing:2px; line-height:1; }
        .pred-val.BIG   { color:var(--orange); text-shadow:0 0 14px var(--orange); }
        .pred-val.SMALL { color:var(--cyan);   text-shadow:0 0 14px var(--cyan); }
        .pred-val.SKIP  { color:#ff4444; font-size:14px; letter-spacing:3px; }
        .pat-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; font-size:7px; font-weight:700; letter-spacing:1px; font-family:'Rajdhani',sans-serif; background:rgba(0,180,255,0.1); color:var(--cyan); border:1px solid rgba(0,180,255,0.28); }
        .conf-row2 { display:flex; align-items:center; gap:4px; margin-top:3px; }
        .cbar-t { flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
        .cbar-f { height:100%; border-radius:2px; transition:width .5s; }
        .conf-p { font-size:7px; color:rgba(0,242,254,0.8); font-weight:700; }
        .pat-reason { font-size:7px; color:rgba(0,200,255,0.58); font-family:'Rajdhani',sans-serif; margin-top:2px; }

        /* ── ACTIVE — BET GUIDE ── */
        .bet-sec { width:100%; background:rgba(0,0,0,0.22); border-radius:8px; padding:7px 10px; border:1px solid rgba(255,215,0,0.18); }
        .bet-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
        .bet-title { font-size:7.5px; font-weight:700; color:var(--gold); letter-spacing:1px; }
        .lvl-badge { font-size:7px; padding:2px 7px; border-radius:10px; font-weight:700; font-family:'Rajdhani',sans-serif; }
        .lv1 { background:rgba(0,255,136,0.18); color:var(--green); border:1px solid rgba(0,255,136,0.38); }
        .lv2 { background:rgba(255,215,0,0.18);  color:var(--gold);  border:1px solid rgba(255,215,0,0.38); }
        .lv3 { background:rgba(255,51,102,0.18); color:var(--red);   border:1px solid rgba(255,51,102,0.38); }
        .lvl-dots { display:flex; gap:4px; margin-bottom:5px; width:100%; }
        .lvl-dot { flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.09); transition:all .3s; }
        .ld-a1 { background:var(--green); box-shadow:0 0 6px var(--green); }
        .ld-a2 { background:var(--gold);  box-shadow:0 0 6px var(--gold); }
        .ld-a3 { background:var(--red);   box-shadow:0 0 6px var(--red); }
        .ld-done { background:rgba(255,255,255,0.22); }
        .bet-amt-row { display:flex; align-items:baseline; gap:5px; margin-bottom:3px; }
        .bet-now-lbl { font-size:7px; color:rgba(255,255,255,0.38); letter-spacing:1px; font-family:'Rajdhani',sans-serif; }
        .bet-now-amt { font-size:20px; font-weight:900; color:var(--gold); text-shadow:0 0 10px rgba(255,215,0,0.55); }
        .bet-pct { font-size:8px; color:rgba(255,215,0,0.55); font-family:'Rajdhani',sans-serif; }
        .bet-guide-txt { font-size:7.5px; color:rgba(255,255,255,0.42); font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:.5px; line-height:1.6; }
        .bet-guide-txt b { color:rgba(255,215,0,0.8); }

        /* ── WIN/LOSS BUTTONS ── */
        .result-row { display:flex; gap:8px; width:100%; }
        .win-btn,.loss-btn { flex:1; padding:9px 5px; border:none; border-radius:10px; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
        .win-btn  { background:linear-gradient(135deg,rgba(0,200,100,0.45),rgba(0,120,60,0.65)); color:var(--green); border:1.5px solid rgba(0,255,136,0.48); }
        .loss-btn { background:linear-gradient(135deg,rgba(200,0,60,0.45),rgba(120,0,30,0.65));  color:var(--red);   border:1.5px solid rgba(255,51,102,0.48); }
        .win-btn:active  { transform:scale(0.95); box-shadow:0 0 16px rgba(0,255,136,0.5); }
        .loss-btn:active { transform:scale(0.95); box-shadow:0 0 16px rgba(255,51,102,0.5); }

        /* ── HISTORY DOTS ── */
        .hdots { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; width:100%; }
        .hd { width:11px; height:11px; border-radius:50%; font-size:5.5px; display:flex; align-items:center; justify-content:center; font-weight:700; font-family:'Rajdhani',sans-serif; }
        .hd-b { background:rgba(255,111,0,0.28); color:var(--orange); border:1px solid rgba(255,111,0,0.48); }
        .hd-s { background:rgba(0,242,254,0.18);  color:var(--cyan);   border:1px solid rgba(0,242,254,0.38); }

        /* ── MILESTONE ── */
        .mile-box { width:100%; border-radius:10px; padding:9px 11px; text-align:center; }
        .mile-green { background:rgba(0,255,136,0.07); border:1.5px solid rgba(0,255,136,0.42); animation:mileG 1.2s ease-in-out infinite alternate; }
        .mile-gold  { background:rgba(255,215,0,0.07);  border:1.5px solid rgba(255,215,0,0.42);  animation:mileG2 1.2s ease-in-out infinite alternate; }
        .mile-red   { background:rgba(255,0,0,0.1);     border:1.5px solid rgba(255,51,102,0.55); animation:mileR .5s ease-in-out infinite alternate; }
        @keyframes mileG  { from{box-shadow:0 0 6px rgba(0,255,136,0.2)}  to{box-shadow:0 0 18px rgba(0,255,136,0.6)} }
        @keyframes mileG2 { from{box-shadow:0 0 6px rgba(255,215,0,0.2)}  to{box-shadow:0 0 18px rgba(255,215,0,0.6)} }
        @keyframes mileR  { from{box-shadow:0 0 10px rgba(255,0,0,0.3)}   to{box-shadow:0 0 28px rgba(255,0,0,0.9)} }
        .mile-emoji { font-size:20px; }
        .mile-title { font-size:10px; font-weight:700; letter-spacing:1px; margin:3px 0; }
        .mile-sub   { font-size:8px; font-family:'Rajdhani',sans-serif; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:1px; line-height:1.6; }
        .more-btn { cursor:pointer; border-radius:8px; padding:5px 16px; margin-top:6px; font-size:8px; font-weight:700; letter-spacing:1px; font-family:'Orbitron',sans-serif; border:1px solid; -webkit-tap-highlight-color:transparent; transition:all .2s; display:inline-block; }
        .more-btn:active { transform:scale(0.95); }
        .more-green { background:rgba(0,200,100,0.3); color:var(--green); border-color:rgba(0,255,136,0.4); }
        .more-gold  { background:rgba(255,215,0,0.25); color:var(--gold);  border-color:rgba(255,215,0,0.45); }
        .more-red   { background:rgba(255,0,0,0.25); color:#ff6666; border-color:rgba(255,0,0,0.45); }

        /* ── PANEL FOOTER ── */
        .bp-footer { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid rgba(0,180,255,0.18); }
        .bp-btn { padding:8px 5px; font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:none; font-family:'Orbitron',sans-serif; transition:.2s; }
        .bp-exec { background:linear-gradient(135deg,rgba(0,100,255,0.48),rgba(0,50,150,0.65)); color:var(--cyan); border-right:1px solid rgba(0,180,255,0.18); }
        .bp-hide { background:linear-gradient(135deg,rgba(0,30,80,0.48),rgba(0,10,40,0.65)); color:rgba(0,180,255,0.65); }
        .bp-btn:active { opacity:.7; }

        /* ── CONTACT ── */
        .contact-a { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:7px; cursor:pointer; background:linear-gradient(90deg,rgba(0,0,0,0.25),rgba(0,30,80,0.35)); border-top:1px solid rgba(0,180,255,0.12); text-decoration:none; -webkit-tap-highlight-color:transparent; transition:opacity .2s; }
        .contact-a:active { opacity:.7; }
        .ci { font-size:10px; color:rgba(100,180,255,0.65); }
        .ct { font-size:8px; color:rgba(100,180,255,0.65); letter-spacing:2px; font-weight:700; }

        /* ── PERIOD BAR ── */
        .period-bar { background:rgba(0,0,0,0.32); padding:3px 10px; font-size:7px; color:rgba(0,242,254,0.4); letter-spacing:1px; text-align:center; border-top:1px solid rgba(0,180,255,0.1); }

        /* ── COMMON ── */
        .scanline { position:absolute; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; border-radius:14px; }
        .corner-tl { position:absolute; top:6px; left:6px; width:12px; height:12px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); pointer-events:none; }
        .rbar  { width:80%; height:3px; background:rgba(0,242,254,0.12); border-radius:2px; overflow:hidden; }
        .rbar-f { height:100%; background:linear-gradient(90deg,transparent,var(--cyan),transparent); animation:pscan 1.2s linear infinite; }
        @keyframes pscan { 0%{transform:translateX(-100%)} 100%{transform:translateX(300%)} }
    </style>
</head>
<body>

<!-- ENTRY -->
<div id="entry-screen">
    <div class="entry-bg-glow"></div>
    <div class="entry-title">WINGO PREDICTION TOOL</div>
    <div class="entry-logo">TASHAN<br>ELITE MODZ</div>
    <div class="phone-wrapper" onclick="initiateVideoSequence()">
        <div class="phone-neon-ring"></div>
        <div class="phone-frame">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <img src="tashan.png" alt="" onerror="this.style.background='linear-gradient(135deg,#0a0050,#000080)'">
            </div>
            <div class="phone-home-bar"></div>
            <div class="phone-btn-right"></div>
            <div class="phone-btn-left1"></div>
            <div class="phone-btn-left2"></div>
        </div>
    </div>
    <div class="click-hint">&#9654; TAP PHONE TO UNLOCK &#9664;</div>
</div>

<!-- VIDEO -->
<div id="video-overlay">
    <video id="fullscreen-video" playsinline autoplay muted preload="auto">
        <source src="mickey.mp4" type="video/mp4">

// ================================================================
//  PATTERN ENGINE — 7 patterns
// ================================================================
function detectPattern(sizes) {
    const n = sizes.length;
    if (n < 3) return {pattern:'NOISE',predictSize:'SKIP',confidence:0,reason:'Not enough data',badge:'NOISE'};
    const last = sizes[0];
    let streak = 1;
    for (let i=1; i<n; i++) { if (sizes[i]===last) streak++; else break; }

    // REVERSAL 5+
    if (streak >= 5) {
        const flip = last==='BIG'?'SMALL':'BIG';
        return {pattern:'REVERSAL', predictSize:flip, confidence: streak>=7?82:75, reason:`${streak}× ${last} LONG STREAK → REVERSAL`, badge:'REVERSAL'};
    }
    // SUDDEN FLIP
    if (streak<=2 && n>=7) {
        const prev = sizes[streak]; let ps=0;
        for (let i=streak; i<n; i++) { if (sizes[i]===prev) ps++; else break; }
        if (ps>=5) return {pattern:'SUDDEN_FLIP', predictSize:last, confidence:70, reason:`FLIP after ${ps}× ${prev} → CONFIRM ${last}`, badge:'FLIP'};
    }
    // CONTINUATION 3-4
    if (streak>=3 && streak<=4) return {pattern:'CONTINUATION', predictSize:last, confidence:streak===4?68:65, reason:`${streak}× ${last} → CONTINUE`, badge:'CONT'};

    // ZIGZAG / TRAP
    let altLen=1;
    for (let i=1; i<Math.min(8,n); i++) { if (sizes[i]!==sizes[i-1]) altLen++; else break; }
    if (altLen>=4) {
        if (streak===2) return {pattern:'TRAP', predictSize:last, confidence:66, reason:`ZIG-ZAG BROKE → TRAP ${last}`, badge:'TRAP'};
        const nxt = last==='BIG'?'SMALL':'BIG';
        return {pattern:'ZIGZAG', predictSize:nxt, confidence:altLen>=6?70:63, reason:`${altLen}× ALT → ${nxt}`, badge:'ZIGZAG'};
    }
    // CLUSTER
    const cw = sizes.slice(0,Math.min(8,n)); let pm=0;
    for (let i=0; i<cw.length-3; i+=2) { if (cw[i]===cw[i+1] && cw[i+2]===cw[i+3] && cw[i]!==cw[i+2]) pm++; }
    if (pm>=2) return {pattern:'CLUSTER', predictSize:last, confidence:67, reason:`PAIR/CLUSTER → ${last}`, badge:'CLUSTER'};

    // NOISE / balance
    const l10 = sizes.slice(0,Math.min(10,n));
    const bigC = l10.filter(s=>s==='BIG').length, smlC = l10.length-bigC;
    if (bigC>=8) return {pattern:'NOISE', predictSize:'SMALL', confidence:55, reason:`BIG HEAVY (${bigC}/10) → SMALL`, badge:'NOISE'};
    if (smlC>=8) return {pattern:'NOISE', predictSize:'BIG',   confidence:55, reason:`SMALL HEAVY (${smlC}/10) → BIG`, badge:'NOISE'};
    return {pattern:'NOISE', predictSize:'SKIP', confidence:0, reason:'MIXED NOISE — NO CLEAR PATTERN', badge:'NOISE'};
}

function detectColor(colors) {
    if (colors.length<3) return {predictColor:null,colorReason:'—'};
    const last=colors[0]; let streak=1;
    for (let i=1;i<colors.length;i++) { if(colors[i]===last) streak++; else break; }
    if (streak>=4) { const f=last==='GREEN'?'RED':'GREEN'; return {predictColor:f,colorReason:`${streak}× ${last} → FLIP`}; }
    if (streak>=2) { const f=last==='GREEN'?'RED':'GREEN'; return {predictColor:f,colorReason:`${streak}× ${last} → SWITCH`}; }
    const c10=colors.slice(0,Math.min(10,colors.length));
    const g=c10.filter(c=>c==='GREEN').length, r=c10.length-g;
    if (g>=7) return {predictColor:'RED',   colorReason:`GREEN HEAVY → RED`};
    if (r>=7) return {predictColor:'GREEN', colorReason:`RED HEAVY → GREEN`};
    return {predictColor:last==='GREEN'?'RED':'GREEN', colorReason:'COLOR SWITCH'};
}

// Skip rules
function allowSkip() {
    const l5 = skipLog.slice(0,5);
    if (l5[0]==='SKIP') return false;
    if (l5.filter(s=>s==='SKIP').length>=2) return false;
    return true;
}
function logSkip(t) { skipLog.unshift(t); if(skipLog.length>5) skipLog.pop(); }
function forcePred(sizes) {
    const l10=sizes.slice(0,Math.min(10,sizes.length));
    const bigC=l10.filter(s=>s==='BIG').length, smlC=l10.length-bigC;
    if (bigC>smlC) return {predictSize:'SMALL',reason:'FORCED: BIG HEAVY → SMALL',confidence:57};
    if (smlC>bigC) return {predictSize:'BIG',  reason:'FORCED: SMALL HEAVY → BIG', confidence:57};
    return {predictSize:sizes[0]==='BIG'?'SMALL':'BIG', reason:'FORCED SWITCH', confidence:55};
}

function analyzeAndPredict(history) {
    if (history.length<3) return null;
    const h = history.slice(0,Math.min(25,history.length));
    const sizes=h.map(r=>r.size), colors=h.map(r=>r.color);

    let {pattern,predictSize,confidence,reason,badge} = detectPattern(sizes);
    if (confidence<55 && pattern==='NOISE') predictSize='SKIP';

    // Skip rule override
    if (predictSize==='SKIP' && !allowSkip()) {
        const f=forcePred(sizes);
        predictSize=f.predictSize; confidence=f.confidence; reason=f.reason; badge='NOISE';
    }

    // Loss flip
    if (predictionLog.length>=3 && predictSize!=='SKIP') {
        if (predictionLog.slice(0,3).every(p=>!p.correct)) {
            predictSize = predictSize==='BIG'?'SMALL':'BIG';
            reason = '⚡ LOSS FLIP — '+reason;
            confidence = Math.min(confidence+8,88);
        }
    }

    const {predictColor,colorReason} = detectColor(colors);
    logSkip(predictSize==='SKIP'?'SKIP':'PRED');
    const skipUsed = skipLog.slice(0,5).filter(s=>s==='SKIP').length;

    // *** OPPOSITE PREDICTION — show reverse ***
    let displaySize = predictSize;
    if      (predictSize==='BIG')   displaySize='SMALL';
    else if (predictSize==='SMALL') displaySize='BIG';
    // SKIP stays SKIP

    return { pattern, predictSize:displaySize, predictColor, confidence, reason, badge, colorReason, skipUsed, skipLeft:Math.max(0,2-skipUsed), sizes:sizes.slice(0,10) };
}

            if (lastKnownPeriod && latest!==lastKnownPeriod) {
                updateHistory(list);
                if (panelState==='active' && predictionReady) { doPrediction(); renderActive(); }
            } else if (!lastKnownPeriod) {
                updateHistory(list);
            }
            lastKnownPeriod = latest;
        }
    } catch(e) { console.error(e); }
}

function updateHistory(list) {
    list.forEach(item => {
        const num=parseInt(item.number), period=item.issueNumber;
        if (!historyResults.find(r=>r.period===period)) {
            historyResults.unshift({period, number:num, size:NUM_PROPS[num].size, color:NUM_PROPS[num].color});
        }
    });
    if (historyResults.length>200) historyResults=historyResults.slice(0,200);
}

async function verifyActivation(file) {
    panelState='checking'; renderPanel();
    try {
        const b64 = (await toBase64(file)).split(',')[1];
        const mime = file.type || 'image/jpeg';

        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 200,
                messages: [{
                    role: 'user',
                    content: [
                        { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
                        { type: 'text', text: `Look at this screenshot and find the "Total balance" amount shown with ₹ symbol.

What is the exact number shown as "Total balance" in this image?

Reply with ONLY this JSON (no other text):
{"balance": NUMBER_OR_NULL}

Where NUMBER is the exact digits shown (example: 500.00 or 151.80 or 1200.50).
If you cannot see any "Total balance" amount, use null.` }
                    ]
                }]
            })
        });

        if (!res.ok) {
            console.error('API error:', res.status);
            panelState = 'error'; renderPanel(); return;
        }

        const d = await res.json();
        const rawText = (d.content || []).map(c => c.text || '').join('').trim();
        console.log('AI raw response:', rawText);

        // Extract number from response — multiple fallback methods
        let detectedBalance = null;

        // Method 1: parse JSON
        try {
            const jsonMatch = rawText.match(/\{[\s\S]*?\}/);
            if (jsonMatch) {
                const parsed = JSON.parse(jsonMatch[0]);
                if (parsed.balance !== null && parsed.balance !== undefined) {
                    detectedBalance = parseFloat(parsed.balance);
                }
            }
        } catch(e) { console.log('JSON parse failed, trying regex'); }

        // Method 2: regex extract any number near 500
        if (detectedBalance === null || isNaN(detectedBalance)) {
            const numMatch = rawText.match(/(\d+\.?\d*)/g);
            if (numMatch) {
                for (const n of numMatch) {
                    const v = parseFloat(n);
                    if (v > 0) { detectedBalance = v; break; }
                }
            }
        }

        console.log('Detected balance:', detectedBalance);

        // Check: balance must be exactly 500.00
        const isExact500 = detectedBalance !== null && !isNaN(detectedBalance) && Math.abs(detectedBalance - 500.00) < 0.05;

        if (isExact500) {
            activationBal  = 500;
            currentBalance = 500;
            betLevel=1; betAmount=calcBet(1,currentBalance,0); lastBetAmt=0;
            winStreak=0; totalWins=0; totalLosses=0;
            mShown={800:false,1000:false,1500:false,2500:false,5000:false};
            activeMile=null; currentPred=null;
            panelState='active'; renderPanel();
            if (historyResults.length>=3) { doPrediction(); renderActive(); }
        } else {
            lowBalAmount = (detectedBalance !== null && !isNaN(detectedBalance) && detectedBalance > 0) ? detectedBalance : null;
            panelState='error'; renderPanel();
        }

    } catch(err) {
        console.error('Verify error:', err);
        panelState='error'; renderPanel();
    }
}

document.getElementById('scan-file-input').addEventListener('change', function(e) {
    const file = e.target.files?.[0]; if (!file) return;

async function processScan(file) {
    if (scanBusy) return; scanBusy=true;
    const lbl = document.getElementById('scan-lbl');
    lbl.classList.add('scanning');
    lbl.innerHTML='<i class="fas fa-spinner fa-spin si"></i><span class="st">...</span>';
    try {
        const b64  = (await toBase64(file)).split(',')[1];
        const mime = file.type||'image/jpeg';
        const res  = await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                model:'claude-sonnet-4-20250514', max_tokens:150,
                messages:[{role:'user', content:[
                    {type:'image', source:{type:'base64', media_type:mime, data:b64}},
                    {type:'text',  text:`Reply ONLY with JSON:
{"isWinGo":true_or_false,"walletBalance":"number_or_null","periodNumber":"period_or_null"}
- isWinGo=true if WinGo game visible (colored balls 0-9, timer, Big/Small buttons)
- walletBalance=wallet balance number without ₹ symbol, null if not visible
- periodNumber=period/issue number string, null if not visible`}
                ]}]
            })
        });
        if (!res.ok) throw new Error('API');
        const d = await res.json();
        const raw = (d.content||[]).map(c=>c.text||'').join('').trim();
        const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
        if (parsed?.isWinGo && parsed.walletBalance && parsed.walletBalance!=='null') {
            const nb = parseFloat(parsed.walletBalance);
            if (!isNaN(nb) && panelState==='active') {
                currentBalance=nb;
                betAmount=calcBet(betLevel,currentBalance,lastBetAmt);
                renderActive();
            }
        }
        if (parsed?.periodNumber && parsed.periodNumber!=='null') {
            document.getElementById('blue-period').textContent=parsed.periodNumber;
        }
        lbl.classList.remove('scanning'); lbl.classList.add('done');
        lbl.innerHTML='<i class="fas fa-check si"></i><span class="st">OK</span>';
        setTimeout(()=>{ lbl.classList.remove('done'); lbl.innerHTML='<i class="fas fa-camera si"></i><span class="st">SCAN</span>'; },3000);
    } catch(err) {
        lbl.classList.remove('scanning');
        lbl.innerHTML='<i class="fas fa-camera si"></i><span class="st">SCAN</span>';
    }
    scanBusy=false;
}

function toBase64(file) {
    return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('Read fail')); r.readAsDataURL(file); });
}

function initiateVideoSequence() {
    if (videoActive) return; videoActive=true;
    const ov=document.getElementById('video-overlay'), vid=document.getElementById('fullscreen-video');
    ov.style.display='flex'; vid.muted=false; vid.autoplay=false; vid.controls=false;
    vid.play().catch(()=>vid.play().catch(()=>{}));
    const end=()=>{ ov.style.display='none'; vid.pause(); vid.currentTime=0; vid.removeEventListener('ended',end); vid.removeEventListener('error',err); startApp(); videoActive=false; };
    const err=()=>{ ov.style.display='none'; startApp(); videoActive=false; };
    vid.addEventListener('ended',end); vid.addEventListener('error',err);
}

document.getElementById('floating-circle').addEventListener('click', function() {

// ================================================================
//  DRAG
// ================================================================
function setupCircleDrag() {
    const el=document.getElementById('floating-circle');
    el.addEventListener('touchstart', e=>{
        const t=e.touches[0]; cDrag.startX=t.clientX; cDrag.startY=t.clientY;
        const r=el.getBoundingClientRect(); cDrag.origX=r.left; cDrag.origY=r.top; cDrag.moved=false;
    },{passive:true});
    el.addEventListener('touchmove', e=>{
        e.preventDefault(); const t=e.touches[0];
        const dx=t.clientX-cDrag.startX, dy=t.clientY-cDrag.startY;
        if (Math.abs(dx)>5||Math.abs(dy)>5) cDrag.moved=true;
        el.style.right='auto'; el.style.left=(cDrag.origX+dx)+'px'; el.style.top=(cDrag.origY+dy)+'px';
    },{passive:false});
}

function setupPanelDrag(id,state) {
    const el=document.getElementById(id);
    const skip = e => ['BUTTON','LABEL','A','INPUT'].includes(e.target.tagName);
    el.addEventListener('touchstart', e=>{
        if (skip(e)) return;
        const t=e.touches[0]; state.startX=t.clientX; state.startY=t.clientY;
        const r=el.getBoundingClientRect(); state.origX=r.left; state.origY=r.top; state.moved=false;
    },{passive:true});
    el.addEventListener('touchmove', e=>{
        if (skip(e)) return;
        e.preventDefault(); const t=e.touches[0];
        const dx=t.clientX-state.startX, dy=t.clientY-state.startY;
        if (Math.abs(dx)>5||Math.abs(dy)>5) state.moved=true;
        el.style.right='auto'; el.style.left=(state.origX+dx)+'px'; el.style.top=(state.origY+dy)+'px';
    },{passive:false});
    el.addEventListener('mousedown', e=>{
        if (skip(e)) return;
        state.dragging=true; state.moved=false; state.startX=e.clientX; state.startY=e.clientY;
        const r=el.getBoundingClientRect(); state.origX=r.left; state.origY=r.top;
    });
    document.addEventListener('mousemove', e=>{
        if (!state.dragging) return;
        const dx=e.clientX-state.startX, dy=e.clientY-state.startY;
        if (Math.abs(dx)>5||Math.abs(dy)>5) state.moved=true;
        el.style.right='auto'; el.style.left=(state.origX+dx)+'px'; el.style.top=(state.origY+dy)+'px';
    });
    document.addEventListener('mouseup', ()=>{ state.dragging=false; });
}
setupPanelDrag('blue-panel', bDrag);
